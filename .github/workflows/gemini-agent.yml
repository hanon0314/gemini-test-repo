name: Gemini Issue Agent

on:
  issues:
    types: [opened]

jobs:
  fix-issue:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install gh
        run: |
          sudo apt install gh -y

      - name: install gemini cli
        run: npm install -g @google/gemini-cli

      - name: create branch
        run: |
          BRANCH="issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH

      - name: run gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          gemini --model gemini-2.0-flash \
          "Read the GitHub issue and implement the requested change"

      - name: commit changes
        run: |
          git config user.name "gemini-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "AI fix for issue #${{ github.event.issue.number }}"

      - name: push branch
        run: |
          git push origin HEAD

      - name: create pull request
        run: |
          gh pr create \
          --title "AI fix for issue #${{ github.event.issue.number }}" \
          --body "Automatically generated by Gemini CLI" \
          --base main

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}